<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multivac Polla 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #031c36;
            --stadium-green: #2ecc71;
            --accent-gold: #f1c40f;
            --text-main: #ecf0f1;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at center, #052a4d 0%, #031c36 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .container { 
            width: 95%; 
            max-width: 1200px; 
            margin: auto; 
            padding: 10px;
        }

        /* HEADER RESPONSIVE */
        header {
            background: #021121;
            border-bottom: 3px solid var(--accent-gold);
            padding: 15px 0;
        }

        .header-content {
            display: flex;
            flex-direction: column; /* Celular por defecto */
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .header-content { flex-direction: row; justify-content: space-between; text-align: left; }
        }

        .logo { height: 50px; }
        h1 { font-family: 'Anton', sans-serif; font-size: 1.8rem; margin: 0; }
        
        /* LOGIN / REGISTRO ADAPTABLE */
        .banner-auth {
            padding: 40px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            margin-top: 20px;
        }

        .input-auth {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            margin: 10px 0;
            box-sizing: border-box; /* Evita que el padding rompa el ancho */
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
        }

        /* GRILLA RESPONSIVA (LA CLAVE) */
        .grid-main {
            display: grid;
            grid-template-columns: 1fr; /* Una columna en móvil */
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 992px) {
            .grid-main { grid-template-columns: 1.8fr 1fr; } /* Dos columnas en PC */
        }

        /* TARJETAS DE PARTIDO ADAPTADAS */
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column; /* Apilado en móvil */
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (min-width: 576px) {
            .match-card { flex-direction: row; justify-content: space-between; padding: 20px; }
        }

        .team { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team.local { justify-content: flex-end; }
        .team-name { font-size: 1.1rem; font-weight: bold; }

        .score-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }

        .input-score {
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Anton', sans-serif;
            background: #222;
            color: var(--accent-gold);
            border: 1px solid #555;
            border-radius: 5px;
        }

        /* PANEL ADMIN SUPERIOR */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; 
            background: #111; z-index: 2000;
            transform: translateY(-100%);
            transition: 0.4s;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            border-bottom: 5px solid var(--accent-gold);
        }
        #admin-panel.open { transform: translateY(0); }

        /* BOTONES GRANDES PARA TOUCH */
        .btn-action {
            width: 100%;
            padding: 15px;
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-primary { background: var(--stadium-green); color: #000; }
        .btn-logout { background: #e74c3c; color: white; margin-top: 10px; width: auto; padding: 8px 15px; }

        /* RANKING TABLE RESPONSIVE */
        .ranking-card { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }

        #admin-toggle {
            position: fixed; bottom: 20px; right: 20px; /* Abajo para fácil acceso con el pulgar */
            background: var(--accent-gold); padding: 15px;
            border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1500; font-size: 1.5rem; cursor: pointer; display: none;
        }

    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="color:var(--accent-gold)">CONSOLA ADMIN 🛠️</h2>
        <div id="admin-contenedor-partidos"></div>
        <button class="btn-action btn-primary" onclick="guardarPanelControl()">ACTUALIZAR RESULTADOS</button>
        <button class="btn-action" style="background:#444; color:white; margin-top:10px" onclick="toggleAdminPanel()">CERRAR</button>
    </div>

    <button id="admin-toggle" onclick="toggleAdminPanel()">⚙️</button>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo" class="logo">
                <h1>MULTIVAC 2026</h1>
            </div>
            <div id="user-info" style="display:none">
                <span id="user-display-name"></span> | <strong id="mis-puntos-total" style="color:var(--accent-gold)">0</strong> pts
                <br><button class="btn-logout" onclick="logout()">Salir</button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section id="auth-container" class="banner-auth">
            <div id="login-form">
                <h2>INICIAR SESIÓN</h2>
                <input type="number" id="cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-action btn-primary" onclick="login()">ENTRAR AL ESTADIO</button>
                <button class="btn-action" style="background:none; color:white; border:1px solid #fff; margin-top:10px" onclick="mostrarRegistro()">REGISTRARME</button>
            </div>

            <div id="register-form" style="display:none;">
                <h2>REGISTRO</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre" class="input-auth">
                <input type="number" id="reg-cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-action btn-primary" onclick="registrar()">CREAR CUENTA</button>
                <button class="btn-action" style="background:none; color:white; margin-top:10px" onclick="mostrarLogin()">VOLVER</button>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div class="grid-main">
                <div class="matches-section">
                    <h3>🏆 TUS PRONÓSTICOS</h3>
                    <div id="contenedor-dinamico"></div>
                    <button class="btn-action btn-primary" style="margin-top:20px" onclick="guardarTodosLosPronosticos()">GUARDAR APUESTAS</button>
                </div>

                <div class="ranking-section">
                    <h3>⚽ TABLA GLOBAL</h3>
                    <div class="ranking-card">
                        <table>
                            <thead><tr><th>#</th><th>Nombre</th><th>Pts</th></tr></thead>
                            <tbody id="body-ranking"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        // [Aquí va el mismo script de Firebase que teníamos, solo asegúrate de que currentUser.role se asigne bien]
        // ... (Tu código de Firebase previo funciona perfecto con esta UI) ...
        
        // Función para abrir/cerrar admin que no rompe el scroll
        window.toggleAdminPanel = () => {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('open');
            document.body.style.overflow = panel.classList.contains('open') ? 'hidden' : 'auto';
        };

        // El resto de funciones (login, registrar, cargarPartidos) se mantienen igual.
    </script>
</body>
</html>
