<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multivac Polla 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #031c36;
            --stadium-green: #2ecc71;
            --accent-gold: #f1c40f;
            --text-main: #ecf0f1;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top, #063a69 0%, #031c36 100%);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        .container { width: 92%; max-width: 1100px; margin: auto; padding: 15px; }

        /* HEADER */
        header { background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent-gold); padding: 10px 0; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 40px; }
        h1 { font-family: 'Anton', sans-serif; font-size: 1.5rem; margin: 0; letter-spacing: 1px; }

        /* AUTH BANNER */
        .banner-auth { background: rgba(0,0,0,0.3); padding: 30px; border-radius: 20px; text-align: center; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .input-auth { 
            width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; 
            border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 1rem;
        }

        /* GRID RESPONSIVE */
        .grid-main { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 992px) { .grid-main { grid-template-columns: 1.6fr 1fr; } }

        /* CARDS PARTIDOS */
        .match-card {
            background: var(--card-bg); border-radius: 15px; padding: 15px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            gap: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        @media (max-width: 480px) {
            .match-card { grid-template-columns: 1fr; text-align: center; padding: 20px; }
            .score-input-container { justify-content: center; margin: 10px 0; }
        }

        .team-name { font-weight: bold; font-size: 1.1rem; }
        .score-input-container { display: flex; align-items: center; gap: 8px; }
        .input-score { 
            width: 45px; height: 45px; text-align: center; font-family: 'Anton', sans-serif; 
            font-size: 1.5rem; background: #111; color: var(--accent-gold); border: 2px solid #444; border-radius: 8px;
        }

        /* BOTONES */
        .btn-action { 
            cursor: pointer; font-family: 'Anton', sans-serif; text-transform: uppercase; 
            padding: 12px 25px; border-radius: 8px; border: none; transition: 0.3s;
        }
        .btn-primary { background: var(--stadium-green); color: #000; width: 100%; }
        .btn-primary:active { transform: scale(0.95); }

        /* PANEL ADMIN */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .admin-row { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent-gold); }

        #admin-toggle {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent-gold);
            width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; display: none; cursor: pointer;
        }

        /* RANKING */
        .ranking-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pos-num { color: var(--accent-gold); font-family: 'Anton', sans-serif; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="color:var(--accent-gold); font-family:'Anton';">MANDO ADMIN 🛠️</h2>
        <div id="admin-contenedor-partidos"></div>
        <button class="btn-action btn-primary" onclick="guardarPanelControl()">PUBLICAR RESULTADOS</button>
        <button class="btn-action" style="background:#444; color:white; width:100%; margin-top:10px" onclick="toggleAdminPanel()">CERRAR</button>
    </div>

    <button id="admin-toggle" onclick="toggleAdminPanel()">⚙️</button>

    <header>
        <div class="container header-content">
            <img src="img/logo.png" alt="Multivac" class="logo">
            <h1>POLLA 2026</h1>
        </div>
    </header>

    <main class="container">
        <section id="auth-container" class="banner-auth">
            <div id="login-form">
                <h2 style="font-family:'Anton'">ENTRAR AL ESTADIO</h2>
                <input type="number" id="cedula" placeholder="Cédula" class="input-auth"><br>
                <input type="password" id="pass" placeholder="Contraseña" class="input-auth"><br>
                <button class="btn-action btn-primary" style="max-width:300px" onclick="login()">ENTRAR</button>
                <p onclick="mostrarRegistro()" style="cursor:pointer; color:var(--stadium-green); margin-top:15px">¿No tienes cuenta? Regístrate aquí</p>
            </div>

            <div id="register-form" style="display:none;">
                <h2 style="font-family:'Anton'">NUEVO JUGADOR</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre" class="input-auth"><br>
                <input type="number" id="reg-cedula" placeholder="Cédula" class="input-auth"><br>
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth"><br>
                <button class="btn-action btn-primary" style="max-width:300px" onclick="registrar()">CREAR CUENTA</button>
                <p onclick="mostrarLogin()" style="cursor:pointer; color:var(--stadium-green); margin-top:15px">Volver al inicio</p>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span id="user-display-name" style="font-weight:bold"></span><br>
                    <span style="color:var(--accent-gold); font-size:1.2rem; font-family:'Anton'"><span id="mis-puntos-total">0</span> PTS</span>
                </div>
                <button onclick="location.reload()" style="background:#e74c3c; border:none; color:white; padding:5px 10px; border-radius:5px">Salir</button>
            </div>

            <div class="grid-main">
                <div class="matches-section">
                    <h3 style="font-family:'Anton'">🏆 TUS PRONÓSTICOS</h3>
                    <div id="contenedor-dinamico"></div>
                    <button class="btn-action btn-primary" onclick="guardarTodosLosPronosticos()">GUARDAR APUESTAS</button>
                </div>

                <div class="ranking-section">
                    <h3 style="font-family:'Anton'">⚽ POSICIONES</h3>
                    <div class="ranking-card">
                        <table>
                            <tbody id="body-ranking"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentCedula = null;

        // --- EXPOSICIÓN GLOBAL DE FUNCIONES (Fix para el error onclick) ---
        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };
        window.toggleAdminPanel = () => { 
            const p = document.getElementById('admin-panel'); 
            p.style.display = (p.style.display === 'block') ? 'none' : 'block'; 
        };

        window.registrar = async () => {
            const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-cedula').value, p = document.getElementById('reg-pass').value;
            if(!n || !c || !p) return alert("Completa los datos");
            await set(ref(db, 'usuarios/' + c), { nombre: n, password: p, puntos: 0, role: "user" });
            alert("¡Registrado!"); mostrarLogin();
        };

        window.login = async () => {
            const c = document.getElementById('cedula').value, p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            if(snap.exists() && snap.val().password === p){
                const user = snap.val();
                currentCedula = c;
                document.getElementById('auth-container').style.display='none';
                document.getElementById('polla-section').style.display='block';
                document.getElementById('user-display-name').innerText = user.nombre;
                
                if(user.role === "admin") {
                    document.getElementById('admin-toggle').style.display = 'block';
                    cargarPanelAdmin();
                }
                actualizarApp();
            } else { alert("Datos incorrectos"); }
        };

        async function actualizarApp() {
            await procesarPuntos();
            cargarPartidos();
            cargarRanking();
        }

        async function cargarPartidos() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            const misVotos = snapV.exists() ? snapV.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            if(snapP.exists()){
                cont.innerHTML = "";
                for(let id in snapP.val()){
                    const p = snapP.val()[id];
                    const lock = p.bloqueado ? 'disabled' : '';
                    cont.innerHTML += `
                        <div class="match-card">
                            <span class="team-name">${p.equipoL}</span>
                            <div class="score-input-container">
                                <input type="number" id="l_${id}" value="${misVotos[id]?.local ?? ''}" class="input-score" ${lock}>
                                <span>-</span>
                                <input type="number" id="v_${id}" value="${misVotos[id]?.visitante ?? ''}" class="input-score" ${lock}>
                            </div>
                            <span class="team-name">${p.equipoV}</span>
                        </div>`;
                }
            }
        }

        window.guardarTodosLosPronosticos = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let datos = {};
            for(let id in snapP.val()){
                if(!snapP.val()[id].bloqueado){
                    const l = document.getElementById(`l_${id}`).value, v = document.getElementById(`v_${id}`).value;
                    if(l !== "" && v !== "") datos[id] = { local: parseInt(l), visitante: parseInt(v) };
                }
            }
            await update(ref(db, `pronosticos/${currentCedula}`), datos);
            alert("¡Guardado!");
        };

        // --- LÓGICA ADMIN ---
        async function cargarPanelAdmin() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapR = await get(child(ref(db), 'resultados_oficiales'));
            const res = snapR.exists() ? snapR.val() : {};
            const cont = document.getElementById('admin-contenedor-partidos');
            cont.innerHTML = "";
            for(let id in snapP.val()){
                const p = snapP.val()[id];
                cont.innerHTML += `
                    <div class="admin-row">
                        <div style="margin-bottom:10px">${p.equipoL} vs ${p.equipoV}</div>
                        <input type="number" id="adm_l_${id}" value="${res[id]?.golesL ?? ''}" style="width:40px"> : 
                        <input type="number" id="adm_v_${id}" value="${res[id]?.golesV ?? ''}" style="width:40px">
                        <label style="margin-left:20px"><input type="checkbox" id="adm_lock_${id}" ${p.bloqueado ? 'checked' : ''}> Bloquear</label>
                    </div>`;
            }
        }

        window.guardarPanelControl = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let results = {}, locks = {};
            for(let id in snapP.val()){
                const l = document.getElementById(`adm_l_${id}`).value, v = document.getElementById(`adm_v_${id}`).value;
                const lock = document.getElementById(`adm_lock_${id}`).checked;
                locks[`partidos_oficiales/${id}/bloqueado`] = lock;
                if(l !== "" && v !== "") results[id] = { golesL: parseInt(l), golesV: parseInt(v) };
            }
            await update(ref(db), locks);
            await set(ref(db, 'resultados_oficiales'), results);
            alert("¡Actualizado!"); location.reload();
        };

        // --- PUNTOS Y RANKING ---
        async function procesarPuntos() {
            const snapO = await get(child(ref(db), 'resultados_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            if(!snapO.exists() || !snapV.exists()) return;
            let total = 0;
            const oficiales = snapO.val(), votos = snapV.val();
            for(let id in oficiales){
                if(votos[id]){
                    const rL = oficiales[id].golesL, rV = oficiales[id].golesV;
                    const pL = votos[id].local, pV = votos[id].visitante;
                    if(rL === pL && rV === pV) total += 5;
                    else if((rL - rV) === (pL - pV)) total += 3;
                    else if(Math.sign(rL - rV) === Math.sign(pL - pV)) total += 2;
                }
            }
            await update(ref(db, `usuarios/${currentCedula}`), { puntos: total });
            document.getElementById('mis-puntos-total').innerText = total;
        }

        async function cargarRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            const sorted = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
            document.getElementById('body-ranking').innerHTML = sorted.map((u, i) => `
                <tr><td class="pos-num">${i+1}</td><td>${u.nombre}</td><td style="font-weight:bold">${u.puntos}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
