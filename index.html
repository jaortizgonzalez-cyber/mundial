<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multivac Polla Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary-dark: #020d1a;
            --accent-green: #00ff88;
            --accent-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Estilos SweetAlert2 */
        .swal2-popup { background: #062a4d !important; border: 1px solid var(--accent-green) !important; border-radius: 25px !important; color: #fff !important; font-family: 'Barlow Condensed', sans-serif !important; }
        .swal2-title { font-family: 'Anton', sans-serif !important; text-transform: uppercase; }
        .swal2-confirm { background: linear-gradient(90deg, #00ff88, #00bd65) !important; color: #000 !important; font-weight: 800 !important; }

        /* ANIMACIÓN DE LÍDERES (FOOTBALL INTRO) */
        #intro-anim {
            position: fixed; inset: 0; background: radial-gradient(circle, #0a4a8c, #020d1a);
            z-index: 20000; display: none; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
        .podium-title { font-family: 'Anton'; font-size: 3rem; color: var(--accent-gold); text-shadow: 0 0 20px rgba(255,204,0,0.5); margin-bottom: 20px; }
        .leader-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 50%; border: 4px solid var(--accent-green); box-shadow: 0 0 50px var(--accent-green); }
        .leader-name { font-family: 'Anton'; font-size: 2.5rem; margin-top: 15px; color: #fff; }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: radial-gradient(circle at top right, #062a4d, var(--primary-dark));
            color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .container { width: 92%; max-width: 1100px; margin: auto; padding: 20px; }

        header { 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); padding: 12px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 10px var(--accent-green)); }
        .logo-text { font-family: 'Anton'; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; }

        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 50px; width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .custom-input {
            width: 100%; padding: 16px; background: rgba(0,0,0,0.4);
            border: 1px solid #333; border-radius: 15px; color: #fff;
            font-size: 1.1rem; box-sizing: border-box; margin-bottom: 20px;
            transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--accent-green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); outline: none; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-family: 'Anton'; font-size: 1.3rem; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .btn-green { background: linear-gradient(90deg, #00ff88, #00bd65); color: #000; }
        .btn-green:hover { transform: scale(1.02); filter: brightness(1.1); }

        .user-hero { 
            background: var(--glass); border-radius: 25px; padding: 30px;
            margin-bottom: 40px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .points-box { font-family: 'Anton'; font-size: 3.5rem; color: var(--accent-gold); line-height: 1; }

        .match-card {
            background: var(--glass); border-radius: 20px; padding: 25px;
            margin-bottom: 20px; border: 1px solid var(--glass-border);
            position: relative; transition: 0.3s;
        }
        .match-card:hover { border-color: var(--accent-green); }
        .match-info { font-size: 0.8rem; color: var(--accent-gold); font-weight: 800; margin-bottom: 15px; }

        .score-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .team-label { flex: 1; font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }
        .input-score {
            width: 55px; height: 55px; background: #000; border: 2px solid #333;
            border-radius: 12px; color: var(--accent-green); text-align: center;
            font-family: 'Anton'; font-size: 1.8rem;
        }
        .input-score:disabled { border-color: #222; color: #444; }

        .rank-item {
            display: flex; justify-content: space-between; padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;
        }
        .pos-num { background: var(--accent-gold); color: #000; width: 28px; height: 28px; 
                   display: inline-flex; align-items: center; justify-content: center; 
                   border-radius: 6px; font-weight: 800; margin-right: 10px; }

        #admin-toggle {
            position: fixed; bottom: 30px; right: 30px; 
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--accent-gold); border: none; cursor: pointer;
            font-size: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: none; z-index: 9999; transition: 0.4s;
        }
        #admin-toggle:hover { transform: rotate(90deg) scale(1.1); }

        #admin-panel {
            position: fixed; inset: 0; background: var(--primary-dark);
            z-index: 10000; display: none; padding: 40px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="intro-anim">
        <h1 class="podium-title animate__animated animate__zoomInDown">🏆 LÍDER ACTUAL 🏆</h1>
        <div class="leader-card animate__animated animate__jackInTheBox">
            <span style="font-size: 4rem;">⚽</span>
        </div>
        <div id="leader-name-anim" class="leader-name animate__animated animate__fadeInUp animate__delay-1s">---</div>
        <div style="color:var(--accent-gold); font-weight:800; letter-spacing:3px" class="animate__animated animate__fadeIn animate__delay-2s">PREPÁRATE PARA GANAR</div>
    </div>

    <button id="admin-toggle" onclick="toggleAdminPanel()">⚙️</button>

    <div id="admin-panel">
        <h1 style="font-family:'Anton'; color:var(--accent-gold)">CONSOLA DE ADMINISTRACIÓN</h1>
        <div class="match-card" style="max-width: 600px">
            <h3 style="color:var(--accent-green)">+ AGREGAR PARTIDO OFICIAL</h3>
            <input type="text" id="new-equipoL" placeholder="Equipo Local" class="custom-input">
            <input type="text" id="new-equipoV" placeholder="Equipo Visitante" class="custom-input">
            <input type="datetime-local" id="new-fecha" class="custom-input">
            <button class="btn-action btn-green" onclick="crearPartidoOficial()">REGISTRAR PARTIDO</button>
        </div>
        <div id="admin-list"></div>
        <button class="btn-action" style="background:var(--accent-gold); margin-top:20px" onclick="guardarPanelControl()">PUBLICAR RESULTADOS FINALES</button>
        <button class="btn-action" style="background:#444; color:white; margin-top:10px" onclick="toggleAdminPanel()">SALIR</button>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo-box">
                <img src="img/logo.png" class="logo-img" alt="M">
                <span class="logo-text">MULTIVAC POLLA</span>
            </div>
            <div id="status-tag" style="font-weight: 800; color: var(--accent-gold); font-size: 0.9rem;">LIVE SERVER</div>
        </div>
    </header>

    <main class="container">
        <section id="auth-container" class="auth-wrapper">
            <div class="auth-card" id="login-form">
                <img src="img/logo.png" style="height: 80px; margin-bottom: 20px;" alt="Logo">
                <h2>BIENVENIDO</h2>
                <input type="number" id="cedula" class="custom-input" placeholder="Cédula" oninput="validarPositivo(this)">
                <input type="password" id="pass" class="custom-input" placeholder="Contraseña">
                <button class="btn-action btn-green" onclick="login()">INGRESAR</button>
                <p style="margin-top:20px; font-size:0.9rem; color:#666">¿No tienes cuenta? <span onclick="mostrarRegistro()" style="color:var(--accent-green); cursor:pointer; font-weight:800">REGÍSTRATE AQUÍ</span></p>
            </div>

            <div class="auth-card" id="register-form" style="display:none;">
                <h2>REGISTRO</h2>
                <input type="text" id="reg-nombre" class="custom-input" placeholder="Nombre Completo">
                <input type="number" id="reg-cedula" class="custom-input" placeholder="Cédula" oninput="validarPositivo(this)">
                <input type="password" id="reg-pass" class="custom-input" placeholder="Contraseña">
                <button class="btn-action btn-green" onclick="registrar()">CREAR CUENTA</button>
                <p style="margin-top:20px; font-size:0.9rem; color:#666" onclick="mostrarLogin()">VOLVER AL LOGIN</p>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div class="user-hero">
                <div>
                    <h2 id="user-display-name" style="margin:0; text-transform:uppercase; color:var(--accent-green)">---</h2>
                    <span style="font-weight:800; color:#888">PUNTAJE ACUMULADO</span>
                </div>
                <div class="points-box"><span id="mis-puntos-total">0</span></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr; gap: 40px;">
                <div id="matches-area">
                    <h3 style="font-family:'Anton'; letter-spacing:1px; margin-bottom:20px;">⚽ TUS PRONÓSTICOS</h3>
                    <div id="contenedor-dinamico"></div>
                    <button class="btn-action btn-green" onclick="guardarTodosLosPronosticos()" style="margin-top:20px">CONFIRMAR MIS MARCADORES</button>
                </div>

                <div id="ranking-area">
                    <h3 style="font-family:'Anton'; letter-spacing:1px; margin-bottom:20px;">🏆 RANKING DE LÍDERES</h3>
                    <div style="background:var(--glass); border-radius:20px; border:1px solid var(--glass-border);" id="body-ranking"></div>
                </div>
            </div>
            
            <button onclick="logout()" style="margin: 50px auto; display:block; background:none; border:none; color:#555; cursor:pointer">Cerrar Sesión</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentCedula = null;

        const alertPro = (title, text, icon = 'success') => {
            Swal.fire({ title, text, icon });
        };

        // FUNCIÓN DE ANIMACIÓN WOW PARA EL LÍDER
        async function mostrarLiderWOW() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const usuarios = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                const lider = usuarios[0];
                document.getElementById('leader-name-anim').innerText = lider.nombre;
                
                const animDiv = document.getElementById('intro-anim');
                animDiv.style.display = 'flex';
                
                setTimeout(() => {
                    animDiv.classList.add('animate__animated', 'animate__fadeOut');
                    setTimeout(() => animDiv.style.display = 'none', 1000);
                }, 4000);
            }
        }

        window.validarPositivo = (el) => { if(el.value < 0) el.value = 0; };
        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };
        window.toggleAdminPanel = () => { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; };

        window.logout = () => { localStorage.removeItem('userCedula'); location.reload(); };

        function estaBloqueado(fecha) {
            const min5 = 5 * 60 * 1000;
            return new Date() >= new Date(new Date(fecha).getTime() - min5);
        }

        window.addEventListener('load', async () => {
            const savedCedula = localStorage.getItem('userCedula');
            if (savedCedula) {
                const snap = await get(child(ref(db), `usuarios/${savedCedula}`));
                if(snap.exists()){
                    currentCedula = savedCedula;
                    completarLogin(snap.val());
                }
            }
        });

        window.login = async () => {
            const c = document.getElementById('cedula').value, p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            if(snap.exists() && snap.val().password === p){
                currentCedula = c;
                localStorage.setItem('userCedula', c);
                completarLogin(snap.val());
            } else { alertPro("ERROR", "Cédula o contraseña incorrecta", "error"); }
        };

        function completarLogin(user) {
            document.getElementById('auth-container').style.display='none';
            document.getElementById('polla-section').style.display='block';
            document.getElementById('user-display-name').innerText = user.nombre;
            
            if(user.role && user.role.toLowerCase() === "admin") {
                document.getElementById('admin-toggle').style.display = 'block';
                cargarPanelAdmin();
            }
            actualizarApp();
            mostrarLiderWOW(); // DISPARAR ANIMACIÓN AL ENTRAR
        }

        window.registrar = async () => {
            const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-cedula').value, p = document.getElementById('reg-pass').value;
            if(!n || !c || !p) return alertPro("ATENCIÓN", "Por favor llena todos los campos", "warning");
            await set(ref(db, 'usuarios/' + c), { nombre: n, password: p, puntos: 0, role: "user" });
            alertPro("¡GOLAZO!", "Cuenta creada con éxito", "success"); 
            mostrarLogin();
        };

        async function actualizarApp() {
            await calcularPuntosLocal();
            renderizarPartidos();
            renderizarRanking();
        }

        async function renderizarPartidos() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            const misVotos = snapV.exists() ? snapV.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            cont.innerHTML = "";
            
            if(snapP.exists()){
                Object.entries(snapP.val()).forEach(([id, p]) => {
                    const bloqueado = estaBloqueado(p.fechaInicio);
                    const fechaObj = new Date(p.fechaInicio);
                    const fechaStr = isNaN(fechaObj) ? "Por definir" : fechaObj.toLocaleString([], {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                    
                    cont.innerHTML += `
                        <div class="match-card">
                            <div class="match-info">
                                <span>${fechaStr}</span>
                                <span style="float:right; color:${bloqueado ? '#ff4444' : 'var(--accent-green)'}">${bloqueado ? '🔒 CERRADO' : '🟢 ABIERTO'}</span>
                            </div>
                            <div class="score-row">
                                <div class="team-label" style="text-align:right">${p.equipoL}</div>
                                <div style="display:flex; gap:10px; align-items:center">
                                    <input type="number" id="l_${id}" value="${misVotos[id]?.local ?? ''}" class="input-score" ${bloqueado ? 'disabled' : ''} oninput="validarPositivo(this)">
                                    <span style="font-weight:800; color:#444">VS</span>
                                    <input type="number" id="v_${id}" value="${misVotos[id]?.visitante ?? ''}" class="input-score" ${bloqueado ? 'disabled' : ''} oninput="validarPositivo(this)">
                                </div>
                                <div class="team-label">${p.equipoV}</div>
                            </div>
                        </div>`;
                });
            }
        }

        window.guardarTodosLosPronosticos = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let updates = {};
            Object.keys(snapP.val()).forEach(id => {
                if(!estaBloqueado(snapP.val()[id].fechaInicio)) {
                    const l = document.getElementById(`l_${id}`).value, v = document.getElementById(`v_${id}`).value;
                    if(l !== "" && v !== "") updates[id] = { local: parseInt(l), visitante: parseInt(v) };
                }
            });
            await update(ref(db, `pronosticos/${currentCedula}`), updates);
            alertPro("RECIBIDO", "Tus marcadores han sido guardados", "success");
        };

        window.crearPartidoOficial = async () => {
            const l = document.getElementById('new-equipoL').value, v = document.getElementById('new-equipoV').value, f = document.getElementById('new-fecha').value;
            if(!l || !v || !f) return alertPro("CAMPO VACÍO", "Completa la info del partido", "warning");
            await set(ref(db, 'partidos_oficiales/p_' + Date.now()), { equipoL: l, equipoV: v, fechaInicio: f });
            alertPro("LISTO", "Partido añadido al calendario", "success"); 
            cargarPanelAdmin(); renderizarPartidos();
        };

        async function cargarPanelAdmin() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const resSnap = await get(child(ref(db), 'resultados_oficiales'));
            const res = resSnap.exists() ? resSnap.val() : {};
            const cont = document.getElementById('admin-list');
            cont.innerHTML = "<h3 style='margin-top:30px'>MARCADORES OFICIALES</h3>";
            if(snapP.exists()){
                Object.entries(snapP.val()).forEach(([id, p]) => {
                    cont.innerHTML += `
                        <div class="match-card" style="display:flex; justify-content:space-between; align-items:center">
                            <span>${p.equipoL} vs ${p.equipoV}</span>
                            <div style="display:flex; gap:5px; align-items:center">
                                <input type="number" id="adm_l_${id}" value="${res[id]?.golesL ?? ''}" style="width:40px; background:#000; color:#fff; border:1px solid #555"> :
                                <input type="number" id="adm_v_${id}" value="${res[id]?.golesV ?? ''}" style="width:40px; background:#000; color:#fff; border:1px solid #555">
                                <button onclick="borrarPartido('${id}')" style="background:none; border:none; cursor:pointer">🗑️</button>
                            </div>
                        </div>`;
                });
            }
        }

        window.guardarPanelControl = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let r = {};
            Object.keys(snapP.val()).forEach(id => {
                const l = document.getElementById(`adm_l_${id}`).value, v = document.getElementById(`adm_v_${id}`).value;
                if(l !== "" && v !== "") r[id] = { golesL: parseInt(l), golesV: parseInt(v) };
            });
            await set(ref(db, 'resultados_oficiales'), r);
            Swal.fire({
                title: '¿PUBLICAR RESULTADOS?',
                text: "El ranking se actualizará para todos",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'SÍ, PUBLICAR'
            }).then((result) => { if (result.isConfirmed) location.reload(); });
        };

        window.borrarPartido = (id) => { 
            Swal.fire({
                title: '¿ELIMINAR PARTIDO?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ELIMINAR'
            }).then(async (result) => {
                if (result.isConfirmed) { await set(ref(db, 'partidos_oficiales/'+id), null); cargarPanelAdmin(); }
            });
        };

        async function calcularPuntosLocal() {
            const snapO = await get(child(ref(db), 'resultados_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            if(!snapO.exists() || !snapV.exists()) return;
            let total = 0;
            const oficiales = snapO.val(), misVotos = snapV.val();
            Object.keys(oficiales).forEach(id => {
                if(misVotos[id]) {
                    const {golesL, golesV} = oficiales[id], {local, visitante} = misVotos[id];
                    if(golesL === local && golesV === visitante) total += 5;
                    else if((golesL - golesV) === (local - visitante)) total += 3;
                    else if(Math.sign(golesL - golesV) === Math.sign(local - visitante)) total += 2;
                }
            });
            await update(ref(db, `usuarios/${currentCedula}`), { puntos: total });
            document.getElementById('mis-puntos-total').innerText = total;
        }

        async function renderizarRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const usuarios = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                document.getElementById('body-ranking').innerHTML = usuarios.map((u, i) => `
                    <div class="rank-item">
                        <span><span class="pos-num">${i+1}</span> <b>${u.nombre}</b></span>
                        <span style="color:var(--accent-gold); font-weight:800">${u.puntos} PTS</span>
                    </div>`).join('');
            }
        }
    </script>
</body>
</html>
