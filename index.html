<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multivac Polla Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo Multivac" class="logo">
                <div class="sitio-titulos">
                    <h1>Multivac</h1>
                    <h2>Polla Mundial 2026</h2>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section id="auth-container" class="banner">
            <div id="login-form">
                <h2>Acceso a la Polla</h2>
                <div class="form-group">
                    <input type="number" id="cedula" placeholder="Número de Cédula" class="input-auth">
                    <input type="password" id="pass" placeholder="Contraseña" class="input-auth">
                </div>
                <div class="btn-group">
                    <button class="btn-guardar" onclick="login()">Entrar</button>
                    <button class="btn-secundario" onclick="mostrarRegistro()">No tengo cuenta (Registrarme)</button>
                </div>
            </div>

            <div id="register-form" style="display:none;">
                <h2>Registro de Nuevo Usuario</h2>
                <div class="form-group">
                    <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-auth">
                    <input type="number" id="reg-cedula" placeholder="Cédula" class="input-auth">
                    <input type="password" id="reg-pass" placeholder="Crea tu Contraseña" class="input-auth">
                </div>
                <div class="btn-group">
                    <button class="btn-guardar" onclick="registrar()">Crear Cuenta</button>
                    <button class="btn-secundario" onclick="mostrarLogin()">Volver al Login</button>
                </div>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div class="welcome-user">
                <h3>Bienvenido/a, <span id="user-display-name"></span></h3>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>

            <div class="partidos">
                <h2>Tus Pronósticos</h2>
                <div class="partido-fila cabecera-tabla">
                    <div>Encuentro</div>
                    <div>Marcador</div>
                    <div>Acción</div>
                </div>
                <div class="partido-fila">
                    <div class="partido-equipos">EE. UU. <span class="vs">vs.</span> México</div>
                    <div class="partido-marcador">
                        <input type="number" id="p1_local" min="0" placeholder="0">
                        <span>:</span>
                        <input type="number" id="p1_visitante" min="0" placeholder="0">
                    </div>
                    <div>
                        <button class="btn-guardar-min" id="btnGuardar">Guardar</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <style>
        /* Estilos rápidos para el formulario */
        .input-auth { padding: 12px; margin: 8px 0; width: 100%; border-radius: 5px; border: 1px solid #ccc; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        .btn-group { margin-top: 20px; }
        .btn-secundario { background: transparent; color: white; border: 1px solid white; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .welcome-user { display: flex; justify-content: space-between; align-items: center; background: #f4f7f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-logout { background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-guardar-min { background: #1e2b4d; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables de sesión local
        let currentUser = null;

        // --- FUNCIONES DE NAVEGACIÓN ---
        window.mostrarRegistro = () => {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        };

        window.mostrarLogin = () => {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        };

        // --- LÓGICA DE REGISTRO ---
        window.registrar = async () => {
            const nombre = document.getElementById('reg-nombre').value;
            const cedula = document.getElementById('reg-cedula').value;
            const pass = document.getElementById('reg-pass').value;

            if (!nombre || !cedula || !pass) return alert("Completa todos los campos");

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `usuarios/${cedula}`));

            if (snapshot.exists()) {
                alert("Esta cédula ya está registrada. Por favor inicia sesión.");
            } else {
                await set(ref(db, 'usuarios/' + cedula), {
                    nombre: nombre,
                    password: pass, // Nota: En producción esto debería ir encriptado
                    puntos: 0
                });
                alert("¡Registro exitoso! Ya puedes iniciar sesión.");
                mostrarLogin();
            }
        };

        // --- LÓGICA DE LOGIN ---
        window.login = async () => {
            const cedula = document.getElementById('cedula').value;
            const pass = document.getElementById('pass').value;

            if (!cedula || !pass) return alert("Ingresa tus credenciales");

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `usuarios/${cedula}`));

            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.password === pass) {
                    currentUser = { cedula, nombre: userData.nombre };
                    iniciarSesion(userData.nombre);
                } else {
                    alert("Contraseña incorrecta");
                }
            } else {
                alert("Cédula no encontrada. Por favor regístrate.");
            }
        };

        function iniciarSesion(nombre) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('polla-section').style.display = 'block';
            document.getElementById('user-display-name').innerText = nombre;
        }

        window.logout = () => { location.reload(); };

        // --- GUARDAR PRONÓSTICO ---
        document.getElementById('btnGuardar').onclick = async () => {
            const l = document.getElementById('p1_local').value;
            const v = document.getElementById('p1_visitante').value;

            if (l === "" || v === "") return alert("Ingresa marcador");

            await set(ref(db, `pronosticos/${currentUser.cedula}/partido_01`), {
                local: l,
                visitante: v,
                nombre: currentUser.nombre
            });
            alert("¡Pronóstico guardado!");
        };

    </script>
</body>
</html>
