<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multivac Futbolera</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-dark: #020d1a;
            --accent-green: #00ff88;
            --accent-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --error-red: #ff4444;
        }

        .swal2-container { z-index: 99999 !important; }

        #intro-anim {
            position: fixed; inset: 0; background: radial-gradient(circle, #0a4a8c, #020d1a);
            z-index: 30000; display: none; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
        .podium-title { font-family: 'Anton'; font-size: 3rem; color: var(--accent-gold); text-shadow: 0 0 20px rgba(255,204,0,0.5); }
        .leader-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 50%; border: 4px solid var(--accent-green); box-shadow: 0 0 50px var(--accent-green); margin: 20px 0; }
        .leader-name { font-family: 'Anton'; font-size: 2.5rem; color: #fff; }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: radial-gradient(circle at top right, #062a4d, var(--primary-dark));
            color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 92%; max-width: 1100px; margin: auto; padding: 20px; }

        header { 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); padding: 15px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 10px var(--accent-green)); }
        .logo-text { font-family: 'Anton'; font-size: 1.8rem; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .fifa-trophy { height: 35px; filter: drop-shadow(0 0 5px var(--accent-gold)); }

        .custom-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Anton'; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; }
        .btn-green { background: linear-gradient(90deg, #00ff88, #00bd65); color: #000; }

        .btn-info { background: rgba(255, 204, 0, 0.1); color: var(--accent-gold); border: 1px solid var(--accent-gold); margin: 20px 0; padding: 12px; width: 100%; border-radius: 12px; font-family: 'Anton'; cursor: pointer; transition: 0.3s; }
        .btn-info:hover { background: var(--accent-gold); color: #000; }

        .match-card { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .input-score { width: 55px; height: 55px; background: #000; border: 2px solid #333; border-radius: 12px; color: var(--accent-green); text-align: center; font-family: 'Anton'; font-size: 1.8rem; }

        .swal-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; }
        .swal-table th, .swal-table td { border: 1px solid #444; padding: 8px; text-align: left; }
        .swal-table th { background: rgba(255,255,255,0.1); color: var(--accent-gold); }

        #admin-toggle { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent-gold); border: none; z-index: 10000; cursor: pointer; font-size: 1.5rem; }
        #admin-panel { position: fixed; inset: 0; background: var(--primary-dark); z-index: 20000; display: none; padding: 40px; overflow-y: auto; }
    
        .btn-spy { 
            background: rgba(0, 255, 136, 0.1); 
            border: 1px solid var(--accent-green); 
            color: var(--accent-green); 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-family: 'Barlow Condensed', sans-serif; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 0.85rem; 
            transition: 0.2s; 
        }
        .btn-spy:hover { 
            background: var(--accent-green); 
            color: #000; 
        }

        .match-row-container {
            display: flex; align-items: center; justify-content: space-between; margin: 15px 0; width: 100%; gap: 10px;
        }
        
        .team-column {
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-width: 0; gap: 6px;
        }
        
        .team-name {
            font-size: clamp(0.9rem, 3vw, 1.2rem); font-weight: 800; color: #ffffff; text-align: center; white-space: normal;
            overflow: visible; text-overflow: clip; word-break: break-word; width: 100%; line-height: 1.1;
        }
        
        .flag-img {
            width: 32px; height: auto; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); display: block;
        }
        
        .score-center-block {
            display: flex; gap: 8px; align-items: center; justify-content: center; flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .match-row-container { gap: 20px; }
            .team-column { flex-direction: row; gap: 12px; flex: 1.5; }
            .team-column:first-child { justify-content: flex-end; }
            .team-column:last-child { flex-direction: row-reverse; justify-content: flex-end; }
            .team-name { width: auto; text-align: right; font-size: 1.3rem; }
            .team-column:last-child .team-name { text-align: left; }
            .flag-img { width: 38px; }
        }
    </style>
</head>
<body>

    <div id="intro-anim">
        <h1 class="podium-title">🏆 LÍDER ACTUAL 🏆</h1>
        <div class="leader-card"><span style="font-size: 4rem;">⚽</span></div>
        <div id="leader-name-anim" class="leader-name">---</div>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo-box">
                <img src="img/logo.png" class="logo-img" alt="M">
                <span class="logo-text">
                    MULTIVAC FUTBOLERA
                    <svg class="fifa-trophy" viewBox="0 0 32 32" fill="none">
                        <path d="M16 2C14.5 2 13 3.5 13 5C13 6.5 14.5 8 16 8C17.5 8 19 6.5 19 5C19 3.5 17.5 2 16 2Z" fill="#FFD700"/>
                        <path d="M11 26C11 24 13 23 16 23C19 23 21 24 21 26V30H11V26Z" fill="#DAA520"/>
                        <path d="M16 8C14 8 12 10 12 13C12 15 13 16 14 18C14.5 19.5 14 21 14 23H18C18 21 17.5 19.5 18 18C19 16 20 15 20 13C20 10 18 8 16 8Z" fill="#FFD700"/>
                        <path d="M12 13C11 13 9 12 9 10V8C9 7 10 6 11 6H12V13Z" fill="#DAA520"/>
                        <path d="M20 13C21 13 23 12 23 10V8C23 7 22 6 21 6H20V13Z" fill="#DAA520"/>
                    </svg>
                </span>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="auth-container" style="display:flex; justify-content:center; padding-top:50px;">
            <div class="match-card" id="login-form" style="max-width:400px; text-align:center; width:100%;">
                <h2 style="font-family:'Anton'">ACCESO</h2>
                <input type="email" id="login-email" class="custom-input" placeholder="Correo">
                <input type="password" id="login-pass" class="custom-input" placeholder="Contraseña">
                <button class="btn-action btn-green" onclick="handleLogin()">ENTRAR</button>
                <p onclick="mostrarRegistro()" style="cursor:pointer; color:var(--accent-gold); margin-top:15px">¿No tienes cuenta? Regístrate</p>
            </div>
            <div class="match-card" id="register-form" style="display:none; max-width:400px; text-align:center; width:100%;">
                <h2 style="font-family:'Anton'">REGISTRO</h2>
                <input type="text" id="reg-nombre" class="custom-input" placeholder="Nombre">
                <input type="text" id="reg-cedula" class="custom-input" placeholder="Cédula">
                <input type="email" id="reg-email" class="custom-input" placeholder="Correo">
                <input type="password" id="reg-pass" class="custom-input" placeholder="Contraseña">
                <button class="btn-action btn-green" onclick="handleRegister()">REGISTRARSE</button>
                <p onclick="mostrarLogin()" style="cursor:pointer; color:#888; margin-top:15px">Volver</p>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div style="background:var(--glass); padding:25px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div>
                    <h2 id="user-display-name" style="margin:0; color:var(--accent-green)">---</h2>
                    <span id="user-display-cedula" style="color:#888">C.C. ---</span>
                </div>
                <div style="font-family:'Anton'; font-size:3rem; color:var(--accent-gold)"><span id="mis-puntos-total">0</span> PTS</div>
            </div>

            <div style="text-align: center; margin: 15px 0;">
                <button id="btn-filtro-jugados" onclick="toggleFiltroJugados()" style="background: rgba(255, 255, 255, 0.08); border: 1px solid var(--accent-gold); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                    👁️ OCULTAR PARTIDOS JUGADOS
                </button>
            </div>

            <div id="contenedor-dinamico"></div>
            <button class="btn-action btn-green" onclick="guardarTodosLosPronosticos()">GUARDAR MIS APUESTAS</button>

            <button class="btn-info" onclick="verReglamento()">📖 REGLAMENTO Y PUNTUACIÓN</button>

            <div id="ranking-area" style="margin-top:20px">
                <h3 style="font-family:'Anton'">🏆 RANKING GLOBAL</h3>
                <div id="body-ranking" style="background:var(--glass); border-radius:20px; padding:10px;"></div>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid var(--error-red); color:var(--error-red); padding:10px; border-radius:10px; width:100%; margin-top:30px; cursor:pointer">Cerrar Sesión</button>
        </section>
    </main>

    <button id="admin-toggle" onclick="toggleAdminPanel()" style="display:none">⚙️</button>

    <div id="admin-panel">
        <h1 style="font-family:'Anton'; color:var(--accent-gold)">CONTROL PANEL</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="match-card">
                <h3>+ AGREGAR PARTIDO</h3>
                <input type="text" id="new-equipoL" placeholder="Local" class="custom-input">
                <input type="text" id="new-equipoV" placeholder="Visitante" class="custom-input">
                <select id="new-grupo" class="custom-input">
                    <option value="" disabled selected>Grupo</option>
                    <option value="A">Grupo A</option><option value="B">Grupo B</option><option value="C">Grupo C</option><option value="D">Grupo D</option>
                    <option value="E">Grupo E</option><option value="F">Grupo F</option><option value="G">Grupo G</option><option value="H">Grupo H</option>
                    <option value="I">Grupo I</option><option value="J">Grupo J</option><option value="K">Grupo K</option><option value="L">Grupo L</option>
                </select>
                <input type="datetime-local" id="new-fecha" class="custom-input">
                <button class="btn-action btn-green" onclick="crearPartidoOficial()">CREAR</button>
            </div>
            <div>
                <h3>RESULTADOS REALES</h3>
                <div id="admin-list"></div>
                <button class="btn-action" style="background:var(--accent-gold); color:#000" onclick="guardarResultadosOficiales()">PUBLICAR TODO</button>
            </div>
        </div>
        <button class="btn-action" style="background:#333; color:#fff; margin-top:20px" onclick="toggleAdminPanel()">SALIR</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentCedula = null;
        let ocultarJugados = false;

        window.toggleFiltroJugados = () => {
            ocultarJugados = !ocultarJugados;
            const btn = document.getElementById('btn-filtro-jugados');
            if (ocultarJugados) {
                btn.innerHTML = "👁️ MOSTRAR PARTIDOS JUGADOS";
                btn.style.background = "rgba(212, 175, 55, 0.2)";
            } else {
                btn.innerHTML = "👁️ OCULTAR PARTIDOS JUGADOS";
                btn.style.background = "rgba(255, 255, 255, 0.08)";
            }
            renderPartidos();
        };

        window.verReglamento = () => {
            Swal.fire({
                title: '<span style="font-family:Anton; color:#ffcc00">REGLAMENTO Y PUNTUACIÓN</span>',
                background: '#020d1a', color: '#fff', width: '95%',
                html: `
                <div style="text-align:left; font-size:0.85rem; line-height:1.4; color:#ccc; max-height: 400px; overflow-y: auto;">
                    <p>Puedes cambiar tu predicción hasta máximo <b>10 minutos antes</b> del inicio del partido.</p>
                    <p><b>90 MINUTOS:</b> Excluye prórrogas o penaltis.</p>
                    <h4 style="color:var(--accent-green)">PUNTUACIÓN (Ronda 1)</h4>
                    <p>• Acertar Ganador/Empate: 5 pts<br>• Goles Local: 2 pts<br>• Goles Visitante: 2 pts<br>• Diferencia: 1 pt</p>
                </div>`,
                confirmButtonText: 'ENTENDIDO', confirmButtonColor: '#00ff88'
            });
        };

        async function mostrarLiderWOW() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const usuarios = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                if(usuarios[0] && usuarios[0].puntos > 0) {
                    const maxPuntos = usuarios[0].puntos;
                    const lideres = usuarios.filter(u => u.puntos === maxPuntos);
                    const nombresLideres = lideres.map(u => u.nombre);
                    let textoLideres = nombresLideres.join(', ');
                    
                    document.getElementById('leader-name-anim').innerText = textoLideres;
                    const animDiv = document.getElementById('intro-anim');
                    animDiv.style.display = 'flex';
                    setTimeout(() => { animDiv.style.display = 'none'; }, 3500);
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user && user.emailVerified) {
                const uidSnap = await get(child(ref(db), `mapa_usuarios/${user.uid}`));
                if(uidSnap.exists()) {
                    currentCedula = uidSnap.val();
                    const uSnap = await get(child(ref(db), `usuarios/${currentCedula}`));
                    const uData = uSnap.val();
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('polla-section').style.display = 'block';
                    document.getElementById('user-display-name').innerText = uData.nombre;
                    document.getElementById('user-display-cedula').innerText = `C.C. ${currentCedula}`;
                    if(uData.role === "admin") document.getElementById('admin-toggle').style.display = 'block';
                    initApp();
                    mostrarLiderWOW();
                }
            }
        });

        async function initApp() {
            await calcularMisPuntos();
            renderPartidos();
            renderRanking();
        }

        async function renderPartidos() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            const snapR = await get(child(ref(db), 'resultados_oficiales'));
            
            const votos = snapV.exists() ? snapV.val() : {};
            const resultadosReales = snapR.exists() ? snapR.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            cont.innerHTML = "";
            
            if(snapP.exists()){
                const ahora = new Date();
                const partidos = Object.entries(snapP.val());
                const banderas = { "alemania": "de", "argentina": "ar", "brasil": "br", "canadá": "ca", "canada": "ca", "catar": "qa", "colombia": "co", "corea del sur": "kr", "españa": "es", "estados unidos": "us", "francia": "fr","ghana": "gh", "uzbekistan": "uz", "uzbekistán": "uz", "mexico": "mx", "méxico": "mx", "republica checa": "cz", "república checa": "cz", "sudafrica": "za", "sudáfrica": "za", "suiza": "ch", "tunez": "tn", "túnez": "tn", "uruguay": "uy", "venezuela": "ve", "bosnia y herzegovina": "ba" };

                const obtenerBandera = (equipo) => {
                    const nombreLimpio = equipo.toLowerCase().trim();
                    const llaveEncontrada = Object.keys(banderas).find(k => nombreLimpio.includes(k) || k.includes(nombreLimpio));
                    const codigo = llaveEncontrada ? banderas[llaveEncontrada] : null;
                    return codigo ? `<img src="https://flagcdn.com/w80/${codigo}.png" class="flag-img" alt="${equipo}">` : `<span>⚽</span>`;
                };

                partidos.forEach(([id, p]) => {
                    const fechaPartido = new Date(p.fechaInicio);
                    const fechaCierre = new Date(fechaPartido.getTime() - 600000);
                    const bloqueado = ahora >= fechaCierre;
                    const mostrarBotonSpy = bloqueado;
                    const resReal = resultadosReales[id];
                    const tieneResultadoOficial = resReal !== undefined && resReal.golesL !== undefined && resReal.golesV !== undefined;

                    if (ocultarJugados && tieneResultadoOficial) return;

                    cont.innerHTML += `
                        <div class="match-card">
                            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--accent-gold); margin-bottom:12px;">
                                <span>GRUPO ${p.grupo}</span>
                                <span>${fechaPartido.toLocaleString([], {day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="match-row-container">
                                <div class="team-column"><div class="team-name">${p.equipoL}</div>${obtenerBandera(p.equipoL)}</div>
                                <div class="score-center-block">
                                    <input type="number" id="l_${id}" value="${votos[id]?.local ?? ''}" class="input-score" ${bloqueado || tieneResultadoOficial ? 'disabled' : ''}>
                                    <input type="number" id="v_${id}" value="${votos[id]?.visitante ?? ''}" class="input-score" ${bloqueado || tieneResultadoOficial ? 'disabled' : ''}>
                                </div>
                                <div class="team-column"><div class="team-name">${p.equipoV}</div>${obtenerBandera(p.equipoV)}</div>
                            </div>
                            <div style="text-align:center; margin-top: 12px;">
                                ${tieneResultadoOficial ? `<div style="color: var(--accent-green); font-weight: bold;">⚽ OFICIAL: ${resReal.golesL} - ${resReal.golesV}</div>` : ''}
                                ${mostrarBotonSpy ? `<button class="btn-spy" onclick="verApuestasGlobales('${id}', '${p.equipoL}', '${p.equipoV}')">👁️ VER APUESTAS</button>` : '<span>🔒 Pronósticos ocultos</span>'}
                            </div>
                        </div>`;
                });
            }
        }

        window.verApuestasGlobales = async (idPartido, equipoL, equipoV) => {
            const snapU = await get(child(ref(db), 'usuarios'));
            const snapV = await get(child(ref(db), 'pronosticos'));
            if(!snapU.exists()) return;
            const usuarios = snapU.val();
            const todosLosPronosticos = snapV.exists() ? snapV.val() : {};
            let tablaHtml = `<table class="swal-table"><tbody>`;
            
            Object.keys(usuarios).forEach(cedula => {
                const voto = todosLosPronosticos[cedula]?.[idPartido];
                const marcador = voto ? `${voto.local} - ${voto.visitante}` : 'Sin apuesta';
                tablaHtml += `<tr><td>${usuarios[cedula].nombre}</td><td><b>${marcador}</b></td></tr>`;
            });
            tablaHtml += `</tbody></table>`;
            Swal.fire({ title: 'APUESTAS', background: '#020d1a', color: '#fff', html: tablaHtml });
        };

        window.guardarTodosLosPronosticos = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let up = {}; const ahora = new Date();
            Object.entries(snapP.val()).forEach(([id, p]) => {
                if (ahora < new Date(new Date(p.fechaInicio).getTime() - 600000)) {
                    const l = document.getElementById(`l_${id}`).value, v = document.getElementById(`v_${id}`).value;
                    if(l !== "" && v !== "") up[id] = { local: parseInt(l), visitante: parseInt(v) };
                }
            });
            await update(ref(db, `pronosticos/${currentCedula}`), up);
            Swal.fire("Éxito", "Pronósticos guardados", "success");
        };

        async function calcularMisPuntos() {
            const snapO = await get(child(ref(db), 'resultados_oficiales'));
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapU = await get(child(ref(db), 'usuarios'));
            const snapV = await get(child(ref(db), 'pronosticos'));
            if(!snapO.exists() || !snapP.exists() || !snapU.exists()) return;
            
            const ofi = snapO.val(), part = snapP.val(), usuarios = snapU.val(), todosLosPronosticos = snapV.exists() ? snapV.val() : {};
            let updatesUsuarios = {};

            Object.keys(usuarios).forEach(cedula => {
                let pts = 0; const misPronosticos = todosLosPronosticos[cedula] || {};
                Object.keys(part).forEach(id => {
                    if(misPronosticos[id] && ofi[id]) {
                        const gl = parseInt(ofi[id].golesL), gv = parseInt(ofi[id].golesV);
                        const pl = parseInt(misPronosticos[id].local), pv = parseInt(misPronosticos[id].visitante);
                        if(Math.sign(gl - gv) === Math.sign(pl - pv)) pts += 5;
                        if(gl === pl) pts += 2; if(gv === pv) pts += 2;
                        if((gl - gv) === (pl - pv)) pts += 1;
                    }
                });
                updatesUsuarios[`usuarios/${cedula}/puntos`] = pts;
            });
            await update(ref(db), updatesUsuarios);
            if (currentCedula && updatesUsuarios[`usuarios/${currentCedula}/puntos`] !== undefined) {
                document.getElementById('mis-puntos-total').innerText = updatesUsuarios[`usuarios/${currentCedula}/puntos`];
            }
        }

        async function renderRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const sorted = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                let htmlRanking = ""; let puesto = 1;
                sorted.forEach((u, i) => {
                    if (i > 0 && u.puntos < sorted[i - 1].puntos) puesto++;
                    htmlRanking += `<div style="display:flex; justify-content:space-between; padding:10px;"><span>${puesto}. ${u.nombre}</span><span>${u.puntos} PTS</span></div>`;
                });
                document.getElementById('body-ranking').innerHTML = htmlRanking;
            }
        }

        window.toggleAdminPanel = () => {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            if(p.style.display === 'block') renderAdminList();
        };

        async function renderAdminList() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapR = await get(child(ref(db), 'resultados_oficiales'));
            const list = document.getElementById('admin-list'); list.innerHTML = "";
            if(snapP.exists()){
                const resOf = snapR.exists() ? snapR.val() : {};
                Object.entries(snapP.val()).forEach(([id, p]) => {
                    list.innerHTML += `<div style="padding:10px;">${p.equipoL} vs ${p.equipoV}<br><input type="number" id="adm_l_${id}" value="${resOf[id]?.golesL ?? ''}" style="width:40px;"> <input type="number" id="adm_v_${id}" value="${resOf[id]?.golesV ?? ''}" style="width:40px;"></div>`;
                });
            }
        }

        window.crearPartidoOficial = async () => {
            const l = document.getElementById('new-equipoL').value, v = document.getElementById('new-equipoV').value, g = document.getElementById('new-grupo').value, f = document.getElementById('new-fecha').value;
            await set(ref(db, 'partidos_oficiales/p_' + Date.now()), { equipoL: l, equipoV: v, grupo: g, fechaInicio: f });
            renderAdminList();
        };

        window.guardarResultadosOficiales = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales')); let data = {};
            Object.keys(snapP.val()).forEach(id => {
                const l = document.getElementById(`adm_l_${id}`).value, v = document.getElementById(`adm_v_${id}`).value;
                if(l !== "" && v !== "") data[id] = { golesL: parseInt(l), golesV: parseInt(v) };
            });
            await set(ref(db, 'resultados_oficiales'), data); await calcularMisPuntos();
        };

        window.handleLogin = async () => {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            try { const res = await signInWithEmailAndPassword(auth, e, p); if(!res.user.emailVerified) await signOut(auth); } catch (err) {}
        };

        window.handleRegister = async () => {
            const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-cedula').value, e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p); await sendEmailVerification(res.user);
                await set(ref(db, `usuarios/${c}`), { nombre: n, email: e, uid: res.user.uid, puntos: 0, role: "user" });
                await set(ref(db, `mapa_usuarios/${res.user.uid}`), c); mostrarLogin();
            } catch (err) {}
        };

        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
