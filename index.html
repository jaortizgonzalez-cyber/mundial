<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multivac Polla Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo Multivac" class="logo">
                <div class="sitio-titulos">
                    <h1>Multivac</h1>
                    <h2>Polla Mundial 2026</h2>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        
        <section id="auth-container" class="banner">
            <div id="login-form">
                <h2>Acceso a la Polla</h2>
                <input type="number" id="cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-guardar" onclick="login()">Entrar</button>
                <button class="btn-secundario" onclick="mostrarRegistro()">Registrarme</button>
            </div>

            <div id="register-form" style="display:none;">
                <h2>Registro</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-auth">
                <input type="number" id="reg-cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-guardar" onclick="registrar()">Crear Cuenta</button>
                <button class="btn-secundario" onclick="mostrarLogin()">Volver</button>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div class="welcome-user">
                <h3>Hola, <span id="user-display-name"></span></h3>
                <button class="btn-logout" onclick="logout()">Salir</button>
            </div>

            <div class="partidos">
                <h2>Pronósticos del Mundial</h2>
                <div id="tabla-partidos">
                    <div class="partido-fila cabecera-tabla">
                        <div>Encuentro</div>
                        <div>Marcador</div>
                        <div>Fecha/Hora</div>
                    </div>
                    <div id="contenedor-dinamico"></div>
                </div>
                <div class="accion-guardar">
                    <button class="btn-guardar" onclick="guardarTodosLosPronosticos()">Guardar Todos mis Pronósticos</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;

        // --- AUTENTICACIÓN ---
        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };

        window.registrar = async () => {
            const n = document.getElementById('reg-nombre').value;
            const c = document.getElementById('reg-cedula').value;
            const p = document.getElementById('reg-pass').value;
            if(!n || !c || !p) return alert("Faltan datos");
            await set(ref(db, 'usuarios/' + c), { nombre: n, password: p, puntos: 0 });
            alert("Registrado correctamente");
            mostrarLogin();
        };

        window.login = async () => {
            const c = document.getElementById('cedula').value;
            const p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            if(snap.exists() && snap.val().password === p){
                currentUser = { cedula: c, nombre: snap.val().nombre };
                document.getElementById('auth-container').style.display='none';
                document.getElementById('polla-section').style.display='block';
                document.getElementById('user-display-name').innerText = currentUser.nombre;
                cargarPartidos(); // Cargar la lista al entrar
            } else { alert("Datos incorrectos"); }
        };

        // --- CARGA DINÁMICA DE PARTIDOS ---
        async function cargarPartidos() {
            const contenedor = document.getElementById('contenedor-dinamico');
            contenedor.innerHTML = "Cargando partidos...";
            
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            if(snap.exists()){
                contenedor.innerHTML = "";
                const partidos = snap.val();
                
                // Recorrer los partidos de Firebase y crear el HTML
                for(let id in partidos) {
                    const p = partidos[id];
                    contenedor.innerHTML += `
                        <div class="partido-fila">
                            <div class="partido-equipos">${p.equipoL} vs ${p.equipoV}</div>
                            <div class="partido-marcador">
                                <input type="number" id="local_${id}" class="input-gol" placeholder="0">
                                <span>:</span>
                                <input type="number" id="visit_${id}" class="input-gol" placeholder="0">
                            </div>
                            <div class="partido-info">${p.fecha} - ${p.hora}</div>
                        </div>
                    `;
                }
            } else {
                contenedor.innerHTML = "No hay partidos programados aún.";
            }
        }

        // --- GUARDAR MASIVO ---
        window.guardarTodosLosPronosticos = async () => {
            const inputs = document.querySelectorAll('.input-gol');
            let datosAEnviar = {};
            
            // Recolectar todos los valores de los inputs
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            const partidos = snap.val();

            for(let id in partidos) {
                const l = document.getElementById(`local_${id}`).value;
                const v = document.getElementById(`visit_${id}`).value;
                if(l !== "" && v !== "") {
                    datosAEnviar[id] = { local: l, visitante: v };
                }
            }

            if(Object.keys(datosAEnviar).length === 0) return alert("Ingresa al menos un pronóstico");

            await set(ref(db, `pronosticos/${currentUser.cedula}`), datosAEnviar);
            alert("¡Todos tus pronósticos han sido guardados!");
        };

        window.logout = () => location.reload();

    </script>

    <style>
        .input-auth { display: block; margin: 10px auto; padding: 10px; width: 80%; max-width: 300px; border-radius: 5px; border: 1px solid #ddd; }
        .input-gol { width: 40px; text-align: center; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        .partido-info { font-size: 0.8em; color: #666; }
        .btn-secundario { background: none; border: 1px solid white; color: white; padding: 10px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .accion-guardar { text-align: center; margin-top: 20px; }
    </style>
</body>
</html>
