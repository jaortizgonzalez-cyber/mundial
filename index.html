<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multivac Polla Elite 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #020d1a;
            --accent-green: #00ff88;
            --accent-gold: #ffcc00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: radial-gradient(circle at top right, #062a4d, var(--primary-dark));
            color: #fff; margin: 0; min-height: 100vh;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .container { width: 92%; max-width: 1000px; margin: auto; padding: 20px; }

        header { 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); padding: 15px 0;
            position: sticky; top: 0; z-index: 100;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .brand-title { font-family: 'Anton'; font-size: 1.8rem; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

        .auth-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 40px; max-width: 400px; margin: 60px auto; text-align: center;
        }

        .custom-input {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.3);
            border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 1.1rem;
            box-sizing: border-box; margin: 10px 0;
        }

        .btn-main {
            width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00bd65);
            border: none; border-radius: 12px; color: #000; font-family: 'Anton'; 
            font-size: 1.2rem; text-transform: uppercase; cursor: pointer;
        }

        .match-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }

        /* BOTON ADMIN - ASEGURADO */
        #admin-toggle {
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--accent-gold); color: #000;
            width: 65px; height: 65px; border-radius: 50%; border: none;
            font-size: 2rem; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; z-index: 9999;
        }

        #admin-panel {
            position: fixed; inset: 0; background: #020d1a;
            z-index: 10000; display: none; padding: 20px; overflow-y: auto;
        }
        
        .admin-item {
            background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <button id="admin-toggle" onclick="toggleAdminPanel()">⚙️</button>

    <div id="admin-panel">
        <h2 style="font-family:'Anton'; color:var(--accent-gold);">PANEL DE CONTROL ADMIN</h2>
        
        <div class="match-card">
            <h3 style="color:var(--accent-green)">+ NUEVO PARTIDO</h3>
            <input type="text" id="new-equipoL" placeholder="Local" class="custom-input">
            <input type="text" id="new-equipoV" placeholder="Visitante" class="custom-input">
            <input type="datetime-local" id="new-fecha" class="custom-input">
            <button class="btn-main" onclick="crearPartidoOficial()">CREAR PARTIDO</button>
        </div>

        <h3 style="font-family:'Anton';">GESTIONAR MARCADORES OFICIALES</h3>
        <div id="admin-contenedor-partidos"></div>
        
        <button class="btn-main" style="background:var(--accent-gold); margin: 20px 0;" onclick="guardarPanelControl()">PUBLICAR Y CALCULAR PUNTOS</button>
        <button class="btn-main" style="background:#444; color:white" onclick="toggleAdminPanel()">CERRAR PANEL</button>
    </div>

    <header>
        <div class="container header-content">
            <span class="brand-title">MULTIVAC POLLA</span>
            <span style="color:var(--accent-gold); font-weight:800">2026 EDITION</span>
        </div>
    </header>

    <main class="container">
        <section id="auth-container">
            <div class="auth-card" id="login-form">
                <h2>ACCESO</h2>
                <input type="number" id="cedula" class="custom-input" placeholder="Cédula" oninput="this.value=Math.abs(this.value)">
                <input type="password" id="pass" class="custom-input" placeholder="Contraseña">
                <button class="btn-main" onclick="login()">ENTRAR</button>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                <div>
                    <h2 id="user-display-name" style="margin:0; color:var(--accent-green)">---</h2>
                    <div style="font-family:'Anton'; font-size:2rem"><span id="mis-puntos-total">0</span> PTS</div>
                </div>
                <button onclick="location.reload()" style="background:#444; border:none; color:white; padding:10px 20px; border-radius:10px">SALIR</button>
            </div>

            <div id="contenedor-dinamico"></div>
            <button class="btn-main" onclick="guardarTodosLosPronosticos()" style="margin-top:20px">GUARDAR MIS APUESTAS</button>
            
            <h3 style="font-family:'Anton'; margin-top:40px">RANKING GLOBAL</h3>
            <div id="body-ranking"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentCedula = null;

        window.toggleAdminPanel = () => {
            const p = document.getElementById('admin-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        };

        window.login = async () => {
            const c = document.getElementById('cedula').value, p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            
            if(snap.exists() && snap.val().password === p) {
                const user = snap.val();
                currentCedula = c;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('polla-section').style.display = 'block';
                document.getElementById('user-display-name').innerText = user.nombre.toUpperCase();
                
                // REGLA DE ORO: Si el rol es admin (en minúsculas o mayúsculas), mostrar el botón
                if(user.role && user.role.toLowerCase() === "admin") {
                    document.getElementById('admin-toggle').style.display = 'block';
                    cargarPanelAdmin();
                }
                actualizarTodo();
            } else { alert("Error de acceso"); }
        };

        async function actualizarTodo() {
            await procesarPuntos();
            cargarPartidosUser();
            cargarRanking();
        }

        // --- GESTIÓN USUARIO ---
        async function cargarPartidosUser() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            const votos = snapV.exists() ? snapV.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            cont.innerHTML = "";
            
            if(snapP.exists()){
                const partidos = snapP.val();
                for(let id in partidos){
                    const p = partidos[id];
                    // Corregir "Invalid Date": Asegurarse que el formato sea ISO
                    const fecha = new Date(p.fechaInicio);
                    const fechaTxt = isNaN(fecha) ? "Pendiente" : fecha.toLocaleString();
                    const bloqueado = !isNaN(fecha) && (new Date() >= new Date(fecha.getTime() - 300000));

                    cont.innerHTML += `
                        <div class="match-card">
                            <div style="font-size:0.8rem; color:var(--accent-gold)">${fechaTxt}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                                <span>${p.equipoL}</span>
                                <div style="display:flex; gap:10px">
                                    <input type="number" id="l_${id}" value="${votos[id]?.local ?? ''}" class="custom-input" style="width:50px; text-align:center; margin:0" ${bloqueado ? 'disabled' : ''}>
                                    <input type="number" id="v_${id}" value="${votos[id]?.visitante ?? ''}" class="custom-input" style="width:50px; text-align:center; margin:0" ${bloqueado ? 'disabled' : ''}>
                                </div>
                                <span>${p.equipoV}</span>
                            </div>
                        </div>`;
                }
            }
        }

        window.guardarTodosLosPronosticos = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let d = {};
            for(let id in snapP.val()){
                const l = document.getElementById(`l_${id}`).value, v = document.getElementById(`v_${id}`).value;
                if(l !== "" && v !== "") d[id] = { local: parseInt(l), visitante: parseInt(v) };
            }
            await update(ref(db, `pronosticos/${currentCedula}`), d);
            alert("Guardado");
        };

        // --- GESTIÓN ADMIN (EL FORMULARIO QUE BUSCAS) ---
        window.crearPartidoOficial = async () => {
            const l = document.getElementById('new-equipoL').value, v = document.getElementById('new-equipoV').value, f = document.getElementById('new-fecha').value;
            if(!l || !v || !f) return alert("Faltan datos");
            const id = "p_" + Date.now();
            await set(ref(db, 'partidos_oficiales/' + id), { equipoL: l, equipoV: v, fechaInicio: f });
            alert("Creado"); cargarPanelAdmin(); cargarPartidosUser();
        };

        async function cargarPanelAdmin() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapR = await get(child(ref(db), 'resultados_oficiales'));
            const res = snapR.exists() ? snapR.val() : {};
            const cont = document.getElementById('admin-contenedor-partidos');
            cont.innerHTML = "";
            
            if(snapP.exists()){
                for(let id in snapP.val()){
                    const p = snapP.val()[id];
                    cont.innerHTML += `
                        <div class="admin-item">
                            <span>${p.equipoL} vs ${p.equipoV}</span>
                            <div>
                                <input type="number" id="adm_l_${id}" value="${res[id]?.golesL ?? ''}" style="width:40px"> : 
                                <input type="number" id="adm_v_${id}" value="${res[id]?.golesV ?? ''}" style="width:40px">
                                <button onclick="eliminarPartido('${id}')" style="background:none; border:none; color:red; cursor:pointer">🗑️</button>
                            </div>
                        </div>`;
                }
            }
        }

        window.guardarPanelControl = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let r = {};
            for(let id in snapP.val()){
                const l = document.getElementById(`adm_l_${id}`).value, v = document.getElementById(`adm_v_${id}`).value;
                if(l !== "" && v !== "") r[id] = { golesL: parseInt(l), golesV: parseInt(v) };
            }
            await set(ref(db, 'resultados_oficiales'), r);
            alert("Resultados Publicados"); location.reload();
        };

        window.eliminarPartido = async (id) => {
            if(confirm("¿Eliminar?")) { await set(ref(db, 'partidos_oficiales/' + id), null); cargarPanelAdmin(); cargarPartidosUser(); }
        };

        // --- PUNTOS ---
        async function procesarPuntos() {
            const snapO = await get(child(ref(db), 'resultados_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            if(!snapO.exists() || !snapV.exists()) return;
            let t = 0; const ofi = snapO.val(), vot = snapV.val();
            for(let id in ofi){
                if(vot[id]){
                    const rL = ofi[id].golesL, rV = ofi[id].golesV, pL = vot[id].local, pV = vot[id].visitante;
                    if(rL === pL && rV === pV) t += 5;
                    else if((rL - rV) === (pL - pV)) t += 3;
                    else if(Math.sign(rL - rV) === Math.sign(pL - pV)) t += 2;
                }
            }
            await update(ref(db, `usuarios/${currentCedula}`), { puntos: t });
            document.getElementById('mis-puntos-total').innerText = t;
        }

        async function cargarRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const sorted = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                document.getElementById('body-ranking').innerHTML = sorted.map((u, i) => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
                        <span>#${i+1} ${u.nombre}</span>
                        <b>${u.puntos} PTS</b>
                    </div>`).join('');
            }
        }
    </script>
</body>
</html>
