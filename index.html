<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multivac Polla Elite 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #020d1a;
            --accent-green: #00ff88;
            --accent-gold: #ffcc00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: radial-gradient(circle at top right, #062a4d, var(--primary-dark));
            color: #fff;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* REMOVER FLECHAS DE INPUTS NUMERICOS */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .container { width: 92%; max-width: 1000px; margin: auto; padding: 20px; }

        /* HEADER PROFESIONAL */
        header { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky; top: 0; z-index: 100;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-wrap { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 8px var(--accent-green)); }
        .brand-title { font-family: 'Anton'; font-size: 1.8rem; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

        /* ESTILO WOW: LOGIN */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            margin: 60px auto;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .auth-card h2 { font-family: 'Anton'; font-size: 2.2rem; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; text-transform: uppercase; color: var(--accent-green); margin-bottom: 8px; font-weight: 800; }
        
        .custom-input {
            width: 100%; padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff; font-size: 1.1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--accent-green); outline: none; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .btn-main {
            width: 100%; padding: 16px;
            background: linear-gradient(90deg, #00ff88, #00bd65);
            border: none; border-radius: 12px;
            color: #000; font-family: 'Anton'; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4); }

        /* APP VIEW */
        .match-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
        @media (min-width: 800px) { .match-grid { grid-template-columns: 1fr 1fr; } }

        .match-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .match-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-green); }

        .match-header { font-size: 0.75rem; color: var(--accent-gold); font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .score-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .team-box { flex: 1; text-align: center; }
        .team-name { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; display: block; }
        
        .input-score-wrap { display: flex; gap: 10px; align-items: center; }
        .input-score {
            width: 50px; height: 50px; border-radius: 12px; border: 2px solid #333;
            background: #000; color: var(--accent-green); text-align: center;
            font-family: 'Anton'; font-size: 1.6rem;
        }
        .input-score:disabled { color: #555; border-color: #222; }

        /* RANKING */
        .ranking-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 25px; border: 1px solid var(--glass-border); }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ranking-table td { padding: 15px 10px; }
        .pos-badge { background: var(--accent-gold); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 800; }

        /* ADMIN FLOAT */
        #admin-toggle {
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--accent-gold); color: #000;
            width: 60px; height: 60px; border-radius: 50%; border: none;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; z-index: 1000;
        }

        /* MODAL ADMIN */
        #admin-panel {
            position: fixed; inset: 0; background: rgba(2, 13, 26, 0.98);
            z-index: 2000; display: none; padding: 40px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="font-family:'Anton'; color:var(--accent-gold); font-size: 2rem;">CENTRO DE MANDO ADMIN</h2>
        <div class="auth-card" style="max-width: 600px; margin: 20px auto; text-align: left;">
            <h3 style="color:var(--accent-green)">+ PROGRAMAR PARTIDO</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <input type="text" id="new-equipoL" placeholder="Local" class="custom-input">
                <input type="text" id="new-equipoV" placeholder="Visitante" class="custom-input">
            </div>
            <label style="margin-top:10px; display:block; font-size:0.8rem">FECHA Y HORA:</label>
            <input type="datetime-local" id="new-fecha" class="custom-input">
            <button class="btn-main" style="margin-top:20px" onclick="crearPartidoOficial()">CONFIRMAR PARTIDO</button>
        </div>

        <div id="admin-contenedor-partidos"></div>
        
        <div style="text-align:center; margin-top:40px">
            <button class="btn-main" style="background:var(--accent-gold); margin-bottom:10px" onclick="guardarPanelControl()">PUBLICAR MARCADORES OFICIALES</button>
            <button class="btn-main" style="background:#444; color:#fff" onclick="toggleAdminPanel()">SALIR DEL PANEL</button>
        </div>
    </div>

    <button id="admin-toggle" onclick="toggleAdminPanel()">⚙️</button>

    <header>
        <div class="container header-content">
            <div class="logo-wrap">
                <img src="img/logo.png" class="logo-img" alt="M">
                <span class="brand-title">MULTIVAC POLLA</span>
            </div>
            <div style="font-weight: 800; color: var(--accent-gold);">2026 EDITION</div>
        </div>
    </header>

    <main class="container">
        <section id="auth-container">
            <div class="auth-card" id="login-form">
                <h2>ACCESO ELITE</h2>
                <div class="input-group">
                    <label>TU CÉDULA</label>
                    <input type="number" id="cedula" class="custom-input" placeholder="00000000" oninput="this.value = Math.abs(this.value)">
                </div>
                <div class="input-group">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="pass" class="custom-input" placeholder="••••••••">
                </div>
                <button class="btn-main" onclick="login()">ENTRAR AL ESTADIO</button>
                <p style="margin-top:25px; font-size:0.9rem; color:#888">¿Eres nuevo? <span onclick="mostrarRegistro()" style="color:var(--accent-green); cursor:pointer; font-weight:800">REGÍSTRATE</span></p>
            </div>

            <div class="auth-card" id="register-form" style="display:none;">
                <h2>REGISTRO PRO</h2>
                <div class="input-group"><label>NOMBRE COMPLETO</label><input type="text" id="reg-nombre" class="custom-input"></div>
                <div class="input-group"><label>CÉDULA</label><input type="number" id="reg-cedula" class="custom-input" oninput="this.value = Math.abs(this.value)"></div>
                <div class="input-group"><label>CONTRASEÑA</label><input type="password" id="reg-pass" class="custom-input"></div>
                <button class="btn-main" onclick="registrar()">CREAR MI CUENTA</button>
                <p style="margin-top:25px; font-size:0.9rem; color:#888" onclick="mostrarLogin()">VOLVER AL LOGIN</p>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:40px">
                <div>
                    <h4 style="margin:0; color:var(--accent-green)" id="user-display-name">---</h4>
                    <div style="font-family:'Anton'; font-size:2.5rem; line-height:1"><span id="mis-puntos-total">0</span> <small style="font-size:1rem">PTS</small></div>
                </div>
                <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#888; padding:8px 15px; border-radius:8px; cursor:pointer">CERRAR SESIÓN</button>
            </div>

            <div class="grid-main" style="display:grid; grid-template-columns: 1fr; gap:40px">
                <div>
                    <h3 style="font-family:'Anton'; border-left:4px solid var(--accent-green); padding-left:15px; margin-bottom:25px">PARTIDOS DISPONIBLES</h3>
                    <div id="contenedor-dinamico" class="match-grid"></div>
                    <button class="btn-main" onclick="guardarTodosLosPronosticos()" style="margin-top:30px">GUARDAR MIS APUESTAS</button>
                </div>

                <div>
                    <h3 style="font-family:'Anton'; border-left:4px solid var(--accent-gold); padding-left:15px; margin-bottom:25px">TOP GLOBAL</h3>
                    <div class="ranking-card">
                        <table class="ranking-table">
                            <tbody id="body-ranking"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentCedula = null;

        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };
        window.toggleAdminPanel = () => { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; };

        function esBloqueado(f) { return new Date() >= new Date(new Date(f).getTime() - 300000); }

        window.login = async () => {
            const c = document.getElementById('cedula').value, p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            if(snap.exists() && snap.val().password === p){
                currentCedula = c;
                document.getElementById('auth-container').style.display='none';
                document.getElementById('polla-section').style.display='block';
                document.getElementById('user-display-name').innerText = snap.val().nombre.toUpperCase();
                if(snap.val().role === "admin") document.getElementById('admin-toggle').style.display = 'block';
                actualizarApp();
            } else { alert("ACCESO DENEGADO"); }
        };

        window.registrar = async () => {
            const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-cedula').value, p = document.getElementById('reg-pass').value;
            if(!n || !c || !p) return alert("COMPLETA LOS DATOS");
            await set(ref(db, 'usuarios/' + c), { nombre: n, password: p, puntos: 0, role: "user" });
            alert("BIENVENIDO AL EQUIPO"); mostrarLogin();
        };

        async function actualizarApp() {
            await procesarPuntos();
            cargarPartidos();
            cargarRanking();
        }

        async function cargarPartidos() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            const votos = snapV.exists() ? snapV.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            cont.innerHTML = "";
            if(snapP.exists()){
                for(let id in snapP.val()){
                    const p = snapP.val()[id], lock = esBloqueado(p.fechaInicio);
                    const dateStr = new Date(p.fechaInicio).toLocaleString([], {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                    cont.innerHTML += `
                        <div class="match-card">
                            <div class="match-header"><span>${dateStr}</span> <span>${lock ? '🔒 CERRADO' : '🟢 ABIERTO'}</span></div>
                            <div class="score-row">
                                <div class="team-box"><span class="team-name">${p.equipoL}</span></div>
                                <div class="input-score-wrap">
                                    <input type="number" id="l_${id}" value="${votos[id]?.local ?? ''}" class="input-score" ${lock ? 'disabled' : ''} oninput="this.value = Math.abs(this.value)">
                                    <span style="font-weight:800; color:#444">VS</span>
                                    <input type="number" id="v_${id}" value="${votos[id]?.visitante ?? ''}" class="input-score" ${lock ? 'disabled' : ''} oninput="this.value = Math.abs(this.value)">
                                </div>
                                <div class="team-box"><span class="team-name">${p.equipoV}</span></div>
                            </div>
                        </div>`;
                }
            }
        }

        window.guardarTodosLosPronosticos = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let d = {};
            for(let id in snapP.val()){
                if(!esBloqueado(snapP.val()[id].fechaInicio)){
                    const l = document.getElementById(`l_${id}`).value, v = document.getElementById(`v_${id}`).value;
                    if(l !== "" && v !== "") d[id] = { local: parseInt(l), visitante: parseInt(v) };
                }
            }
            await update(ref(db, `pronosticos/${currentCedula}`), d);
            alert("PRONÓSTICOS ASEGURADOS");
        };

        window.crearPartidoOficial = async () => {
            const l = document.getElementById('new-equipoL').value, v = document.getElementById('new-equipoV').value, f = document.getElementById('new-fecha').value;
            if(!l || !v || !f) return alert("FALTA INFORMACIÓN");
            await set(ref(db, 'partidos_oficiales/p_' + Date.now()), { equipoL: l, equipoV: v, fechaInicio: f });
            alert("PARTIDO CREADO"); cargarPanelAdmin(); cargarPartidos();
        };

        async function cargarPanelAdmin() {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            const res = (await get(child(ref(db), 'resultados_oficiales'))).val() || {};
            const cont = document.getElementById('admin-contenedor-partidos');
            cont.innerHTML = "";
            for(let id in snapP.val()){
                const p = snapP.val()[id];
                cont.innerHTML += `
                    <div class="admin-row">
                        <span>${p.equipoL} vs ${p.equipoV}</span>
                        <div>
                            <input type="number" id="adm_l_${id}" value="${res[id]?.golesL ?? ''}" style="width:40px" oninput="this.value = Math.abs(this.value)"> : 
                            <input type="number" id="adm_v_${id}" value="${res[id]?.golesV ?? ''}" style="width:40px" oninput="this.value = Math.abs(this.value)">
                            <button onclick="eliminarPartido('${id}')" style="background:none; border:none; color:red">🗑️</button>
                        </div>
                    </div>`;
            }
        }

        window.guardarPanelControl = async () => {
            const snapP = await get(child(ref(db), 'partidos_oficiales'));
            let r = {};
            for(let id in snapP.val()){
                const l = document.getElementById(`adm_l_${id}`).value, v = document.getElementById(`adm_v_${id}`).value;
                if(l !== "" && v !== "") r[id] = { golesL: parseInt(l), golesV: parseInt(v) };
            }
            await set(ref(db, 'resultados_oficiales'), r);
            alert("RESULTADOS PUBLICADOS"); location.reload();
        };

        window.eliminarPartido = async (id) => { if(confirm("¿ELIMINAR?")) { await set(ref(db, 'partidos_oficiales/' + id), null); cargarPanelAdmin(); cargarPartidos(); } };

        async function procesarPuntos() {
            const snapO = await get(child(ref(db), 'resultados_oficiales'));
            const snapV = await get(child(ref(db), `pronosticos/${currentCedula}`));
            if(!snapO.exists() || !snapV.exists()) return;
            let t = 0; const ofi = snapO.val(), vot = snapV.val();
            for(let id in ofi){
                if(vot[id]){
                    const rL = ofi[id].golesL, rV = ofi[id].golesV, pL = vot[id].local, pV = vot[id].visitante;
                    if(rL === pL && rV === pV) t += 5;
                    else if((rL - rV) === (pL - pV)) t += 3;
                    else if(Math.sign(rL - rV) === Math.sign(pL - pV)) t += 2;
                }
            }
            await update(ref(db, `usuarios/${currentCedula}`), { puntos: t });
            document.getElementById('mis-puntos-total').innerText = t;
        }

        async function cargarRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const sorted = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                document.getElementById('body-ranking').innerHTML = sorted.map((u, i) => `
                    <tr><td><span class="pos-badge">#${i+1}</span></td><td><b>${u.nombre}</b></td><td style="text-align:right"><b>${u.puntos} PTS</b></td></tr>
                `).join('');
            }
        }
    </script>
</body>
</html>
