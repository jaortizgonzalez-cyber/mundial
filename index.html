<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multivac Polla Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo Multivac" class="logo">
                <div class="sitio-titulos">
                    <h1>Multivac</h1>
                    <h2>Polla Mundial 2026</h2>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="auth-container" class="banner">
            <div id="login-form">
                <h2>Acceso a la Polla</h2>
                <input type="number" id="cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-guardar" onclick="login()">Entrar</button>
                <button class="btn-secundario" onclick="mostrarRegistro()">Registrarme</button>
            </div>
            <div id="register-form" style="display:none;">
                <h2>Registro</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre Completo" class="input-auth">
                <input type="number" id="reg-cedula" placeholder="Cédula" class="input-auth">
                <input type="password" id="reg-pass" placeholder="Contraseña" class="input-auth">
                <button class="btn-guardar" onclick="registrar()">Crear Cuenta</button>
                <button class="btn-secundario" onclick="mostrarLogin()">Volver</button>
            </div>
        </section>

        <section id="polla-section" style="display:none;">
            <div class="welcome-user">
                <div>
                    <h3>Hola, <span id="user-display-name"></span></h3>
                    <p>Puntos: <strong id="mis-puntos-total">0</strong></p>
                </div>
                <button class="btn-logout" onclick="logout()">Salir</button>
            </div>

            <div id="admin-panel" style="display:none; background: #fff3e0; border: 2px solid #ff9800; padding: 20px; border-radius: 8px; margin: 20px 0;">
                <h2 style="color: #e65100;">🛠️ Panel de Control Oficial (Solo Admin)</h2>
                <p>Ingresa los resultados finales para actualizar los puntos de todos.</p>
                <div id="admin-contenedor-partidos"></div>
                <button class="btn-guardar" style="background: #e65100;" onclick="guardarResultadosOficiales()">Publicar Resultados Oficiales</button>
            </div>

            <div class="grid-dos-columnas">
                <div class="partidos">
                    <h2>Tus Pronósticos</h2>
                    <div id="contenedor-dinamico"></div>
                    <div class="accion-guardar">
                        <button class="btn-guardar" id="btnGuardarFinal" onclick="guardarTodosLosPronosticos()">Guardar Mis Apuestas</button>
                    </div>
                </div>

                <div class="ranking-seccion">
                    <h2>Ranking General</h2>
                    <table id="tabla-ranking">
                        <thead>
                            <tr><th>Pos</th><th>Nombre</th><th>Pts</th></tr>
                        </thead>
                        <tbody id="body-ranking"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLBiRdbJyGb6cYrlA-1xi-N8TqJnsUljk",
            authDomain: "mundial-15371.firebaseapp.com",
            projectId: "mundial-15371",
            storageBucket: "mundial-15371.firebasestorage.app",
            messagingSenderId: "740014298129",
            appId: "1:740014298129:web:9098b4ed2c579527a68db0",
            databaseURL: "https://mundial-15371-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;

        // --- AUTENTICACIÓN ---
        window.mostrarRegistro = () => { document.getElementById('login-form').style.display='none'; document.getElementById('register-form').style.display='block'; };
        window.mostrarLogin = () => { document.getElementById('login-form').style.display='block'; document.getElementById('register-form').style.display='none'; };

        window.registrar = async () => {
            const n = document.getElementById('reg-nombre').value, c = document.getElementById('reg-cedula').value, p = document.getElementById('reg-pass').value;
            await set(ref(db, 'usuarios/' + c), { nombre: n, password: p, puntos: 0, role: "user" });
            alert("Registrado. ¡Ya puedes entrar!");
            mostrarLogin();
        };

        window.login = async () => {
            const c = document.getElementById('cedula').value, p = document.getElementById('pass').value;
            const snap = await get(child(ref(db), `usuarios/${c}`));
            if(snap.exists() && snap.val().password === p){
                const userData = snap.val();
                currentUser = { cedula: c, nombre: userData.nombre, role: userData.role };
                
                document.getElementById('auth-container').style.display='none';
                document.getElementById('polla-section').style.display='block';
                document.getElementById('user-display-name').innerText = currentUser.nombre;

                if(currentUser.role === "admin") {
                    document.getElementById('admin-panel').style.display = 'block';
                    cargarPanelAdmin();
                }

                await procesarPuntos();
                cargarPartidos();
                cargarRanking();
            } else { alert("Cédula o clave incorrecta"); }
        };

        // --- LÓGICA DE ADMIN ---
        async function cargarPanelAdmin() {
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            const snapOficial = await get(child(ref(db), 'resultados_oficiales'));
            const oficiales = snapOficial.exists() ? snapOficial.val() : {};
            const cont = document.getElementById('admin-contenedor-partidos');
            
            if(snap.exists()){
                const partidos = snap.val();
                cont.innerHTML = "";
                for(let id in partidos){
                    const resL = oficiales[id] ? oficiales[id].golesL : "";
                    const resV = oficiales[id] ? oficiales[id].golesV : "";
                    cont.innerHTML += `
                        <div style="margin-bottom:10px;">
                            ${partidos[id].equipoL} <input type="number" id="admin_l_${id}" value="${resL}" style="width:40px"> : 
                            <input type="number" id="admin_v_${id}" value="${resV}" style="width:40px"> ${partidos[id].equipoV}
                        </div>`;
                }
            }
        }

        window.guardarResultadosOficiales = async () => {
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            let resultados = {};
            for(let id in snap.val()){
                const l = document.getElementById(`admin_l_${id}`).value;
                const v = document.getElementById(`admin_v_${id}`).value;
                if(l !== "" && v !== "") resultados[id] = { golesL: l, golesV: v };
            }
            await set(ref(db, 'resultados_oficiales'), resultados);
            alert("Resultados publicados. Los puntos se actualizarán al recargar.");
            location.reload();
        };

        // --- LÓGICA DE USUARIO ---
        async function cargarPartidos() {
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            const misVotosSnap = await get(child(ref(db), `pronosticos/${currentUser.cedula}`));
            const misVotos = misVotosSnap.exists() ? misVotosSnap.val() : {};
            const cont = document.getElementById('contenedor-dinamico');
            
            if(snap.exists()){
                cont.innerHTML = "";
                for(let id in snap.val()){
                    const p = snap.val()[id];
                    const isDisabled = p.bloqueado ? "disabled" : "";
                    cont.innerHTML += `
                        <div class="partido-fila">
                            <div>${p.equipoL} vs ${p.equipoV} ${p.bloqueado ? '🔒' : ''}</div>
                            <div class="partido-marcador">
                                <input type="number" id="local_${id}" value="${misVotos[id]?.local || ''}" class="input-gol" ${isDisabled}> : 
                                <input type="number" id="visit_${id}" value="${misVotos[id]?.visitante || ''}" class="input-gol" ${isDisabled}>
                            </div>
                        </div>`;
                }
            }
        }

        async function procesarPuntos() {
            const snapOficial = await get(child(ref(db), 'resultados_oficiales'));
            const snapMisVotos = await get(child(ref(db), `pronosticos/${currentUser.cedula}`));
            if(!snapOficial.exists() || !snapMisVotos.exists()) return;
            
            let total = 0;
            const oficiales = snapOficial.val();
            const votos = snapMisVotos.val();

            for(let id in oficiales){
                if(votos[id]){
                    const rL = parseInt(oficiales[id].golesL), rV = parseInt(oficiales[id].golesV);
                    const pL = parseInt(votos[id].local), pV = parseInt(votos[id].visitante);
                    if(rL === pL && rV === pV) total += 5;
                    else if((rL - rV) === (pL - pV)) total += 3;
                    else if(Math.sign(rL - rV) === Math.sign(pL - pV)) total += 2;
                }
            }
            await update(ref(db, `usuarios/${currentUser.cedula}`), { puntos: total });
            document.getElementById('mis-puntos-total').innerText = total;
        }

        async function cargarRanking() {
            const snap = await get(child(ref(db), 'usuarios'));
            if(snap.exists()){
                const sorted = Object.values(snap.val()).sort((a,b) => b.puntos - a.puntos);
                document.getElementById('body-ranking').innerHTML = sorted.map((u, i) => `<tr><td>${i+1}</td><td>${u.nombre}</td><td>${u.puntos}</td></tr>`).join('');
            }
        }

        window.guardarTodosLosPronosticos = async () => {
            const snap = await get(child(ref(db), 'partidos_oficiales'));
            let datos = {};
            for(let id in snap.val()){
                if(!snap.val()[id].bloqueado){
                    const l = document.getElementById(`local_${id}`).value, v = document.getElementById(`visit_${id}`).value;
                    if(l !== "" && v !== "") datos[id] = { local: l, visitante: v };
                }
            }
            await update(ref(db, `pronosticos/${currentUser.cedula}`), datos);
            alert("¡Apuestas guardadas!");
            location.reload();
        };

        window.logout = () => location.reload();
    </script>

    <style>
        .grid-dos-columnas { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .input-auth { display: block; margin: 10px auto; padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #ddd; }
        .input-gol { width: 40px; text-align: center; }
        #tabla-ranking { width: 100%; border-collapse: collapse; background: white; }
        #tabla-ranking td, #tabla-ranking th { padding: 8px; border-bottom: 1px solid #eee; }
        .welcome-user { background: #1e2b4d; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
    </style>
</body>
</html>
